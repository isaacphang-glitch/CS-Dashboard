<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Bookings — Daily Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #0a0910;
    color: #e8e6f0;
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: 28px 36px;
    height: 100vh;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 18px;
    border-bottom: 1px solid #1e1b2e;
    flex-shrink: 0;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1;
    margin-bottom: 4px;
  }

  .page-subtitle { font-size: 13px; color: #6b6880; }

  .header-stats {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  .hstat {
    background: #16141f;
    border: 1px solid #2a2835;
    border-radius: 12px;
    padding: 10px 20px;
    text-align: center;
    min-width: 100px;
  }

  .hstat.accent { border-color: #7c3aed40; }

  .hstat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6b6880;
    margin-bottom: 3px;
  }

  .hstat-value {
    font-family: 'DM Sans', sans-serif;
    font-size: 30px;
    font-weight: 700;
    color: #a78bfa;
    line-height: 1;
  }

  .hstat-value.white { color: #e8e6f0; }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 220px;
    gap: 16px;
    flex: 1;
    min-height: 0;
  }

  /* LEADERBOARD COLUMNS */
  .lb-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  .col-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #4a4760;
  }

  .col-total {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #6b6880;
  }

  .leaderboard {
    display: flex;
    flex-direction: column;
    gap: 7px;
    overflow: hidden;
    flex: 1;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #16141f;
    border-radius: 9px;
    padding: 10px 14px;
    border: 1px solid #1e1b2e;
    flex-shrink: 0;
  }

  .lb-row.first { border-color: #7c3aed50; background: #1a1628; }

  .lb-row.offline {
    opacity: 0.35;
    background: #13111a;
  }

  .rank {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 700;
    width: 16px;
    text-align: center;
    color: #3d3a52;
    flex-shrink: 0;
  }

  .rank.gold   { color: #f59e0b; }
  .rank.silver { color: #94a3b8; }
  .rank.bronze { color: #c2855a; }

  .member-name {
    flex: 1;
    font-size: 13px;
    font-weight: 400;
    color: #c4c1d4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tl-badge {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.06em;
    background: #2d2040;
    color: #a78bfa;
    border: 1px solid #7c3aed40;
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  .offline-badge {
    font-size: 8px;
    font-weight: 700;
    background: #1e1b2e;
    color: #4a4760;
    border: 1px solid #2a2835;
    border-radius: 3px;
    padding: 1px 5px;
    flex-shrink: 0;
  }

  .bar-wrap {
    width: 60px;
    height: 5px;
    background: #2a2835;
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .bar-fill { height: 100%; border-radius: 3px; background: #5b21b6; transition: width 0.6s ease; }
  .bar-fill.top { background: #a78bfa; }
  .lb-row.offline .bar-fill { background: #2a2835; }

  .booking-count {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #e8e6f0;
    min-width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .lb-row.offline .booking-count { color: #3d3a52; }

  /* RIGHT COLUMN */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }

  .award-card {
    background: #16141f;
    border: 1px solid #7c3aed40;
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .award-star { font-size: 28px; line-height: 1; margin-bottom: 10px; }

  .award-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #4a4760;
    margin-bottom: 10px;
  }

  .award-name {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
    line-height: 1.1;
  }

  .award-sub { font-size: 11px; color: #a78bfa; }
  .award-empty { font-size: 12px; color: #3d3a52; font-style: italic; }

  .stat-card {
    background: #16141f;
    border: 1px solid #1e1b2e;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
  }

  .stat-val {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #e8e6f0;
    line-height: 1;
  }

  .stat-lbl { font-size: 10px; color: #6b6880; margin-top: 3px; }

  /* FOOTER */
  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 12px;
    flex-shrink: 0;
    gap: 7px;
    font-size: 10px;
    color: #3d3a52;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: #22c55e;
    border-radius: 50%;
    flex-shrink: 0;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  .error-msg { color: #ef4444; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 class="page-title">CS Bookings</h1>
    <p class="page-subtitle" id="today-date"></p>
  </div>
  <div class="header-stats">
    <div class="hstat accent">
      <p class="hstat-label">Today</p>
      <p class="hstat-value" id="total-daily">&#8212;</p>
    </div>
    <div class="hstat">
      <p class="hstat-label">This week</p>
      <p class="hstat-value white" id="total-weekly">&#8212;</p>
    </div>
    <div class="hstat">
      <p class="hstat-label">This month</p>
      <p class="hstat-value white" id="total-monthly">&#8212;</p>
    </div>
    <div class="hstat">
      <p class="hstat-label">Online now</p>
      <p class="hstat-value white" id="stat-online">&#8212;</p>
    </div>
  </div>
</div>

<div class="main">
  <div class="lb-col">
    <div class="col-header">
      <span class="col-title">Today</span>
    </div>
    <div class="leaderboard" id="lb-daily"></div>
  </div>

  <div class="lb-col">
    <div class="col-header">
      <span class="col-title">This week</span>
    </div>
    <div class="leaderboard" id="lb-weekly"></div>
  </div>

  <div class="lb-col">
    <div class="col-header">
      <span class="col-title">This month</span>
    </div>
    <div class="leaderboard" id="lb-monthly"></div>
  </div>

  <div class="right-col">
    <div class="award-card">
      <div class="award-star">&#9733;</div>
      <p class="award-title">Performer of the day</p>
      <div id="award-display">
        <p class="award-empty">Not yet awarded</p>
      </div>
    </div>
    <div class="stat-card">
      <p class="stat-val" id="stat-avg">&#8212;</p>
      <p class="stat-lbl">Avg bookings today</p>
    </div>
  </div>
</div>

<div class="footer">
  <div class="live-dot" id="live-dot"></div>
  <span id="update-time">Connecting to sheet...</span>
</div>

<script>
  var API = 'https://script.google.com/macros/s/AKfycbz-bueh8tomgh9mel8ATCA_1DKJyUYFnBXWcJ6t8aP333Vwkqx6rHXCHvOQDuTaa1Sz/exec';
  var REFRESH_MS = 30000;
  var RANK_CLASS = ['gold', 'silver', 'bronze'];

  function setDate() {
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-AU', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
  }

  function buildLeaderboard(containerId, members, period) {
    var active  = members.filter(function(m) { return m.status === 'active'; });
    var offline = members.filter(function(m) { return m.status !== 'active'; });
    var activeSorted  = active.slice().sort(function(a, b) { return b[period] - a[period]; });
    var offlineSorted = offline.slice().sort(function(a, b) { return b[period] - a[period]; });
    var sorted = activeSorted.concat(offlineSorted);
    var max = (activeSorted[0] && activeSorted[0][period] > 0) ? activeSorted[0][period] : 1;
    var lb = document.getElementById(containerId);
    lb.innerHTML = '';
    var rank = 0;

    for (var i = 0; i < sorted.length; i++) {
      var m     = sorted[i];
      var isOff = m.status !== 'active';
      if (!isOff) rank++;
      var pct     = Math.round((m[period] / max) * 100);
      var isFirst = (i === 0 && !isOff && m[period] > 0);
      var row     = document.createElement('div');
      row.className = 'lb-row' + (isFirst ? ' first' : '') + (isOff ? ' offline' : '');
      var rankStr  = isOff ? '&#8212;' : rank;
      var rankCls  = isOff ? '' : (RANK_CLASS[rank - 1] || '');
      var tlBadge  = m.role === 'TL' ? '<span class="tl-badge">TL</span>' : '';
      var offBadge = isOff ? '<span class="offline-badge">Offline</span>' : '';
      row.innerHTML =
        '<span class="rank ' + rankCls + '">' + rankStr + '</span>' +
        '<span class="member-name">' + m.name + tlBadge + offBadge + '</span>' +
        '<div class="bar-wrap"><div class="bar-fill ' + (isFirst ? 'top' : '') + '" style="width:' + pct + '%"></div></div>' +
        '<span class="booking-count">' + m[period] + '</span>';
      lb.appendChild(row);
    }
  }

  function renderAward(winner) {
    var el = document.getElementById('award-display');
    if (!winner || winner.trim() === '') {
      el.innerHTML = '<p class="award-empty">Not yet awarded</p>';
    } else {
      el.innerHTML = '<p class="award-name">' + winner.trim() + '</p><p class="award-sub">Today\'s top performer</p>';
    }
  }

  function renderAll(data) {
    var members = data.members;
    buildLeaderboard('lb-daily',   members, 'daily');
    buildLeaderboard('lb-weekly',  members, 'weekly');
    buildLeaderboard('lb-monthly', members, 'monthly');
    renderAward(data.award);

    var active = members.filter(function(m) { return m.status === 'active'; });
    var totalDaily   = members.reduce(function(s, m) { return s + m.daily;   }, 0);
    var totalWeekly  = members.reduce(function(s, m) { return s + m.weekly;  }, 0);
    var totalMonthly = members.reduce(function(s, m) { return s + m.monthly; }, 0);
    var activeDaily  = active.reduce(function(s, m)  { return s + m.daily;   }, 0);

    document.getElementById('total-daily').textContent   = totalDaily;
    document.getElementById('total-weekly').textContent  = totalWeekly;
    document.getElementById('total-monthly').textContent = totalMonthly;
    document.getElementById('stat-online').textContent   = active.length;
    document.getElementById('stat-avg').textContent      = active.length ? Math.round(activeDaily / active.length) : 0;
  }

  function fetchData() {
    fetch(API)
      .then(function(res) { return res.json(); })
      .then(function(data) {
        renderAll(data);
        document.getElementById('update-time').textContent =
          'Live \u00b7 Last updated ' + new Date().toLocaleTimeString('en-AU', {
            hour: '2-digit', minute: '2-digit', second: '2-digit'
          });
        document.getElementById('live-dot').style.background = '#22c55e';
      })
      .catch(function(err) {
        console.error(err);
        document.getElementById('update-time').innerHTML = '<span class="error-msg">Could not load sheet \u2014 check Apps Script deployment</span>';
        document.getElementById('live-dot').style.background = '#ef4444';
      });
  }

  setDate();
  fetchData();
  setInterval(fetchData, REFRESH_MS);
  setInterval(setDate, 60000);
</script>

</body>
</html>
